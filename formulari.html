<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULARI DE COMPRA</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<body>
<div class="contenedor3">
    <div class="formulario">

        <h3 class="titulo2">Formulari de compra</h3>

        <div class="campo">
            <label class="etiqueta">Correu electrónic</label>
            <input type="email" class="entrada" placeholder="name@example.com">
        </div>

        <div class="campo">
            <label class="etiqueta">Nom</label>
            <input type="text" class="entrada" placeholder="El teu nom">
        </div>

        <div class="campo">
            <label class="etiqueta">Cognoms</label>
            <input type="text" class="entrada" placeholder="Els teus cognoms">
        </div>

        <div class="campo">
            <label class="etiqueta">Direcció</label>
            <textarea class="entrada" rows="2" placeholder="La teva direcció completa"></textarea>
        </div>

        <div class="campo">
            <label class="etiqueta">Numero de conta</label>
            <textarea class="entrada" rows="2" placeholder="El teu numero de conta"></textarea>
        </div>

        <div class="campo">
            <label class="etiqueta">Numero de teléfon</label>
            <textarea class="entrada" rows="2" placeholder="El teu numero de teléfon"></textarea>
        </div>

        <div>
            <button class="boton2">Pagar</button>
        </div>

        <br>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
