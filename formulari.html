<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULARIO DE COMPRA</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<body>
<div class="contenedor3">
    <div class="formulario">

        <h3 class="titulo2">Formulario de compra</h3>

        <div class="campo">
            <label class="etiqueta">Correo electrónico</label>
            <input type="email" class="entrada" placeholder="name@example.com">
        </div>

        <div class="campo">
            <label class="etiqueta">Nombre</label>
            <input type="text" class="entrada" placeholder="Tu nombre">
        </div>

        <div class="campo">
            <label class="etiqueta">Apellidos</label>
            <input type="text" class="entrada" placeholder="Tus apellidos">
        </div>

        <div class="campo">
            <label class="etiqueta">Dirección</label>
            <textarea class="entrada" rows="2" placeholder="Tu dirección completa"></textarea>
        </div>

        <div class="campo">
            <label class="etiqueta">Numero de Cuenta</label>
            <textarea class="entrada" rows="2" placeholder="Tu numero de cuenta"></textarea>
        </div>

        <div class="campo">
            <label class="etiqueta">Numero de teléfono</label>
            <textarea class="entrada" rows="2" placeholder="Tu numero de teléfono"></textarea>
        </div>

        <div>
            <button class="boton2">Pagar</button>
        </div>

        <br>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
